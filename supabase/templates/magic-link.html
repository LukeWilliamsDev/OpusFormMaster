<!--
  Supabase Auth email template: "Magic Link"
  Paste into: Supabase Dashboard → Authentication → Emails → Magic Link
  Not read by Supabase automatically — kept here for reference/version history only.
-->
<head>
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <style>
    :root { color-scheme: light dark; supported-color-schemes: light dark; }
    .bg-page { background-color: #F5F1EA !important; background-image: none !important; }
    .bg-card { background-color: #FDFAF5 !important; background-image: none !important; }
    .bg-header { background-color: #EAE5DC !important; background-image: none !important; }
    .text-title { color: #2B2F33 !important; }
    .text-secondary { color: #5A5450 !important; }
    .border-theme { border-color: #D9D3C7 !important; }
    @media (prefers-color-scheme: dark) {
      .bg-page { background-color: #1B1C20 !important; background-image: none !important; }
      .bg-card { background-color: #232429 !important; background-image: none !important; }
      .bg-header { background-color: #2E3036 !important; background-image: none !important; }
      .text-title { color: #EDEBE6 !important; }
      .text-secondary { color: #ACA89F !important; }
      .border-theme { border-color: #2E3036 !important; }
    }
    [data-ogsc] .text-title { color: #EDEBE6 !important; }
    [data-ogsc] .text-secondary { color: #ACA89F !important; }
    [data-ogsb] .bg-page { background-color: #1B1C20 !important; background-image: none !important; }
    [data-ogsb] .bg-card { background-color: #232429 !important; background-image: none !important; }
    [data-ogsb] .bg-header { background-color: #2E3036 !important; background-image: none !important; }
  </style>
</head>
<div class="bg-page" style="background-color: #F5F1EA; padding: 40px 20px; font-family: 'Inter', -apple-system, sans-serif; font-size: 14px; line-height: 1.6;">
  <div class="bg-card border-theme" style="max-width: 600px; margin: 0 auto; background-color: #FDFAF5; border: 1px solid #D9D3C7; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.15);">
    <div class="bg-header border-theme" style="background-color: #EAE5DC; padding: 30px 40px; border-bottom: 3px solid #B5651D; text-align: center;">
      <span class="text-title" style="font-family: 'Arial Black', Arial, sans-serif; font-weight: 900; font-size: 30px; letter-spacing: 3px;">OPUS<span style="color: #B5651D; padding: 0 8px; font-size: 22px;">&bull;</span>FORM</span>
    </div>
    <div style="padding: 40px;">
      <div style="text-transform: uppercase; font-size: 10px; font-weight: 900; letter-spacing: 0.2em; color: #B5651D; margin-bottom: 20px;">Your Sign-In Link</div>
      <p class="text-title" style="margin: 0 0 16px; font-size: 16px; font-weight: 700;">Hello,</p>
      <p class="text-secondary" style="margin: 0 0 24px;">Click below to securely sign in to your Opus Form account. This link can only be used once.</p>
      <div style="text-align: center; margin-bottom: 32px;">
        <a href="{{ .ConfirmationURL }}" style="display: inline-block; padding: 14px 28px; background-color: #B5651D; color: #FDFAF5; text-decoration: none; border-radius: 8px; font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: 0.15em; box-shadow: 0 4px 12px rgba(181, 101, 29, 0.3);">Sign In</a>
      </div>
      <p class="text-secondary" style="margin: 0 0 24px; font-size: 12px; text-align: center;">If you did not request this link, you can safely ignore this email.</p>
      <div class="border-theme" style="border-top: 1px solid #D9D3C7; padding-top: 24px; margin-top: 32px;">
        <p class="text-title" style="margin: 0 0 4px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;">Opus Form Support</p>
        <a href="mailto:support@opusform.co.uk" style="color: #B5651D; text-decoration: none; font-size: 12px; font-weight: 700;">support@opusform.co.uk</a>
      </div>
    </div>
  </div>
</div>
